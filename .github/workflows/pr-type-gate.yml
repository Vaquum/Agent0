name: pr-type-gate

on:
  pull_request:
    branches: [main]

jobs:
  pr-type-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pyright src/
