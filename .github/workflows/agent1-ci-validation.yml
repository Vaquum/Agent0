name: Agent1 CI Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  intentional_failure:
    name: intentional_failure
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository layout
        run: |
          test -f README.md
          test -f LICENSE
          test -d .github/workflows
          echo 'Repository layout validation passed.'

      - name: Publish intentional_failure status context
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const stateMap = { success: "success", failure: "failure", cancelled: "error" };
            const state = stateMap["${{ job.status }}"] || "error";
            const targetSha = context.payload.pull_request?.head?.sha || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: targetSha,
              state,
              context: "intentional_failure",
              description: `intentional_failure job ${"${{ job.status }}"}`,
            });

  validation:
    name: validation
    runs-on: ubuntu-latest
    needs: intentional_failure
    steps:
      - name: Mirror validation success context
        run: echo 'Validation alias check passed.'

      - name: Publish validation status context
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const stateMap = { success: "success", failure: "failure", cancelled: "error" };
            const state = stateMap["${{ job.status }}"] || "error";
            const targetSha = context.payload.pull_request?.head?.sha || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: targetSha,
              state,
              context: "validation",
              description: `validation job ${"${{ job.status }}"}`,
            });
