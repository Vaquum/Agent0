name: Agent1 CI Validation

on:
  pull_request:
    branches:
      - main

jobs:
  intentional_failure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository layout
        run: |
          test -f README.md
          test -f LICENSE
          test -d .github/workflows
          echo 'Repository layout validation passed.'
