services:
  - type: web
    name: agent0
    runtime: docker
    region: frankfurt
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHITELISTED_ORGS
        sync: false
      - key: POLL_INTERVAL
        value: "30"
      - key: EXECUTOR_TIMEOUT
        value: "600"
      - key: MAX_TURNS
        value: "100"
      - key: LOG_LEVEL
        value: INFO
      - key: DATA_DIR
        value: /data
    disk:
      name: agent0-data
      mountPath: /data
      sizeGB: 10
